# =============================================================================
# loop-vibe-coding — per-project configuration
# Copy this file into the ROOT of your target repository and fill it in.
#
# The loop skills (loop-coder / loop-reviewer) read ONLY this file plus your
# repo's AGENTS.md. They contain no project knowledge themselves, so this is
# the single glue layer between "the generic loop" and "your specific project".
# =============================================================================

# -----------------------------------------------------------------------------
# State machine backend: the Lark Base that holds one row per change.
# -----------------------------------------------------------------------------
base:
  app_token: "bascnXXXXXXXXXXXXXXXX"   # Base app token (from the base URL)
  table_id:  "tblXXXXXXXXXXXXXXXX"     # the state-machine table id

  # Field-name mapping. Your Base columns may be named anything you like;
  # the skills refer to the LOGICAL names on the left, resolved via this map.
  fields:
    task:        "task"          # human task description (you fill on kickoff)
    change_id:   "change_id"     # OpenSpec change id (coder fills after spec)
    status:      "status"        # single-select, see `loop.transitions`
    owner:       "owner"         # single-select: coder | reviewer | human
    spec_ref:    "spec_ref"      # spec content or link
    review:      "review"        # reviewer's latest structured feedback
    resolution:  "resolution"    # coder's judgement + how each item was handled
    round:       "round"         # number, review iteration counter (breaker)
    test_report: "test_report"   # machine test output + your acceptance notes
    bug:         "bug"           # repro steps you log when bouncing back
    claimed_by:  "claimed_by"    # optimistic-lock token (agents write/clear it)
    updated_at:  "updated_at"    # auto-timestamp, used to detect new changes

# -----------------------------------------------------------------------------
# Who plays each role. Swap these two values to flip coder/reviewer between
# tools — skills and the state machine are role-based and don't care.
# -----------------------------------------------------------------------------
roles:
  coder:    codex          # e.g. codex | claude-code | cursor | ...
  reviewer: claude-code

# -----------------------------------------------------------------------------
# OpenSpec integration (https://github.com/Fission-AI/OpenSpec)
# -----------------------------------------------------------------------------
openspec:
  dir: "openspec"          # change-spec directory (OpenSpec default)

# -----------------------------------------------------------------------------
# Loop behaviour & safety rails.
# -----------------------------------------------------------------------------
loop:
  max_rounds: 5            # circuit breaker. Counts the spec (new<->spec) and the
                           # code (reviewing<->fixing) ping-pongs SEPARATELY: `round`
                           # resets to 0 when the spec is approved (spec.on_clean)
                           # and again on a human bug bounce (testing.on_bug), so
                           # each loop gets its own full budget. If either loop
                           # exceeds this without converging, force owner=human,
                           # status=testing with a note.
  poll_hint: "300s"        # suggested polling interval; actual cadence is set by
                           # each agent's own scheduler (Codex Automation / CC /loop).
                           # A two-model loop burns tokens — keep this relaxed.

  # The state machine. Each agent looks up the CURRENT status here to decide
  # what to do and who to hand the baton to next. Edit this to change the flow
  # WITHOUT touching the skills.
  transitions:
    new:
      owner: coder
      next_status: spec
      next_owner: reviewer
    spec:
      owner: reviewer
      on_issues: { next_status: new,          next_owner: coder }                      # spec needs work
      on_clean:  { next_status: implementing, next_owner: coder, reset_round: true }    # spec approved — fresh budget for the code loop
    implementing:
      owner: coder
      next_status: reviewing
      next_owner: reviewer
    reviewing:
      owner: reviewer
      on_issues: { next_status: fixing,  next_owner: coder }
      on_clean:  { next_status: testing, next_owner: human }
    fixing:
      owner: coder
      next_status: reviewing
      next_owner: reviewer
    testing:
      owner: human         # the acceptance gate ALWAYS stops here for a human.
      # human outcome:
      #   pass -> status=integrating, owner=coder        (mechanical finish, below)
      #   bug  -> status=implementing, owner=coder, round=0, and fill `bug`
      on_pass: { next_status: integrating,  next_owner: coder }
      on_bug:  { next_status: implementing, next_owner: coder, reset_round: true }
    integrating:
      owner: coder         # post-acceptance bookkeeping ONLY (human already passed).
      # The coder runs a final self-check, commits, and `openspec archive`s the
      # change, then closes the row. This is the ONLY path that reaches `done`.
      next_status: done
      next_owner: none     # `none` = CLEAR the owner field (leave it empty), NOT
                           # the literal string "none". `done` rows have no owner.

# -----------------------------------------------------------------------------
# Quality gate. Which feedback severities MUST be fixed before a change can pass
# review. Anything at or above these levels routes reviewing -> fixing.
# -----------------------------------------------------------------------------
quality_gate:
  block_levels: ["P0", "P1"]   # P2/P3 are advisory and do not block
  # The single source of truth for HOW to test/lint/build. The skills read the
  # `## Loop Commands` section of this file at runtime — never hard-coded.
  commands_source: "AGENTS.md"
